<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevDock</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <span class="logo">
        <img src="favicon-32x32.png" alt="" class="logo-icon" />
        DevDock
      </span>
      <div class="header-actions">
        <input type="text" id="search" placeholder="Search..." />
        <button id="btn-add" title="Add project">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
    </header>

    <!-- Dashboard table -->
    <div id="dashboard">
      <table id="project-table">
        <thead>
          <tr>
            <th class="col-status"></th>
            <th class="col-name">Name</th>
            <th class="col-url">URL</th>
            <th class="col-quick">Actions</th>
            <th class="col-dots"></th>
          </tr>
        </thead>
        <tbody id="project-list"></tbody>
      </table>

      <div id="empty" class="hidden">
        <div class="empty-icon">&#128187;</div>
        <p>No projects yet</p>
        <p class="empty-sub">Add a project folder to get started</p>
        <button id="btn-add-empty">+ Add Project</button>
      </div>
    </div>

    <!-- Log panel (slides up from bottom) -->
    <div id="log-panel" class="hidden">
      <div id="log-header">
        <div class="log-title">
          <span id="log-project-name"></span>
          <span id="log-active-cmd" class="log-cmd-badge"></span>
        </div>
        <div class="log-actions">
          <button id="log-clear" title="Clear logs">Clear</button>
          <button id="log-close" title="Close">&times;</button>
        </div>
      </div>

      <!-- Command bar inside log panel -->
      <div id="log-commands"></div>

      <div id="log-output"></div>
    </div>
  </div>

  <!-- 3-dot dropdown menu (positioned dynamically) -->
  <div id="context-menu" class="hidden">
    <div id="ctx-commands"></div>
    <div id="div-cmds" class="ctx-divider"></div>
    <button class="ctx-item" data-action="restart">
      <span class="ctx-icon">&#8635;</span> Restart
    </button>
    <button class="ctx-item" data-action="stop">
      <span class="ctx-icon">&#9632;</span> Stop
    </button>
    <div id="div-process" class="ctx-divider"></div>
    <button class="ctx-item" data-action="browser">
      <span class="ctx-icon">&#127760;</span> Open in Browser
    </button>
    <button class="ctx-item" data-action="vscode">
      <span class="ctx-icon"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 16 16"><path fill="#2196f3" d="M11.5 11.19V4.8L7.3 7.99M1.17 6.07a.6.6 0 0 1-.01-.81L2 4.48c.14-.13.48-.18.73 0l2.39 1.83l5.55-5.09c.22-.22.61-.32 1.05-.08l2.8 1.34c.25.15.49.38.49.81v9.49c0 .28-.2.58-.42.7l-3.08 1.48c-.22.09-.64 0-.79-.14L5.11 9.69l-2.38 1.83c-.27.18-.6.13-.74 0l-.84-.77c-.22-.23-.2-.61.04-.84l2.1-1.9"/></svg></span> Open in VS Code
    </button>
    <button class="ctx-item" data-action="explorer">
      <span class="ctx-icon">&#128193;</span> Show in Explorer
    </button>
    <div class="ctx-divider"></div>
    <button class="ctx-item" data-action="edit">
      <span class="ctx-icon">&#9998;</span> Edit
    </button>
    <button class="ctx-item danger" data-action="remove">
      <span class="ctx-icon">&#10005;</span> Remove
    </button>
  </div>

  <!-- Add/Edit dialog -->
  <div id="dialog-overlay" class="hidden">
    <div id="dialog">
      <h3 id="dialog-title">Add Project</h3>

      <label>Project folder
        <div class="input-row">
          <input type="text" id="inp-dir" placeholder="C:\Users\you\projects\app" />
          <button id="btn-scan" title="Scan package.json">Scan</button>
        </div>
      </label>

      <label>Name
        <input type="text" id="inp-name" placeholder="my-app" />
      </label>

      <div id="cmd-list-header">
        <span>Commands</span>
        <button id="btn-add-cmd" title="Add command">+</button>
      </div>
      <div id="cmd-list"></div>

      <div class="dialog-actions">
        <button id="btn-cancel" class="secondary">Cancel</button>
        <button id="btn-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Confirm dialog -->
  <div id="confirm-overlay" class="hidden">
    <div id="confirm-box">
      <p id="confirm-msg">Are you sure?</p>
      <div class="dialog-actions">
        <button id="confirm-no" class="secondary">Cancel</button>
        <button id="confirm-yes" class="danger">Remove</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
